name: Laravel FTP Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, xml, bcmath, curl

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Build Laravel Cache
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      # 🔎 VERIFY SECRET ACCESS
      - name: Verify FTP Secret Access
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then
            echo "FTP_SERVER is EMPTY"
            exit 1
          else
            echo "FTP_SERVER is PRESENT"
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: "./"
          server-dir: "objectsai.app/objectsaideploy/"
